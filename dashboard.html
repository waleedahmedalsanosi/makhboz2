<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — مخبوز</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.stat-card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  text-align: center;
}

.stat-number {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin: 10px 0;
}

.stat-label {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.product-item, .order-item {
  background: var(--card);
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow);
}

.product-actions, .order-actions {
  display: flex;
  gap: 8px;
}

.btn-small {
  padding: 4px 12px;
  font-size: 0.8rem;
}

.status-badge {
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 600;
}

.status-pending { background: var(--accent); color: white; }
.status-confirmed { background: var(--success); color: white; }
.status-delivered { background: var(--primary); color: white; }

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

.tab {
  padding: 10px 20px;
  background: none;
  border: none;
  cursor: pointer;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
}

.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>
</head>
<body>
<nav class="navbar" id="main-nav"></nav>

<main>
<div class="container">
  <div class="page-header">
    <h1>لوحة التحكم</h1>
    <p>مرحباً بك <span id="baker-name"></span></p>
  </div>

  <!-- Statistics Cards -->
  <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
    <div class="stat-card">
      <div class="stat-label">المنتجات</div>
      <div class="stat-number" id="products-count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">الطلبات الجديدة</div>
      <div class="stat-number" id="pending-orders">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">إجمالي المبيعات</div>
      <div class="stat-number" id="total-sales">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">التقييم</div>
      <div class="stat-number" id="rating">4.5</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('products')">منتجاتي</button>
    <button class="tab" onclick="showTab('orders')">الطلبات</button>
    <button class="tab" onclick="showTab('add-product')">إضافة منتج</button>
  </div>

  <!-- Products Tab -->
  <div id="products-tab" class="tab-content active">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>منتجاتي</h3>
      <button class="btn btn-primary" onclick="showTab('add-product')">+ إضافة منتج جديد</button>
    </div>
    <div id="products-list"></div>
  </div>

  <!-- Orders Tab -->
  <div id="orders-tab" class="tab-content">
    <h3>الطلبات</h3>
    <div id="orders-list"></div>
  </div>

  <!-- Add Product Tab -->
  <div id="add-product-tab" class="tab-content">
    <h3>إضافة منتج جديد</h3>
    <form id="add-product-form" class="form-card">
      <div class="form-group">
        <label class="form-label">اسم المنتج</label>
        <input type="text" class="form-input" id="product-name" required>
      </div>
      <div class="form-group">
        <label class="form-label">الوصف</label>
        <textarea class="form-input" id="product-description" rows="3" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">السعر</label>
        <input type="number" class="form-input" id="product-price" min="0" step="0.5" required>
      </div>
      <div class="form-group">
        <label class="form-label">الوحدة</label>
        <select class="form-input" id="product-unit" required>
          <option value="piece">قطعة</option>
          <option value="dozen">دزينة</option>
          <option value="kg">كيلو</option>
          <option value="box">صندوق</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">الفئة</label>
        <select class="form-input" id="product-category" required>
          <option value="kaak">كعك</option>
          <option value="petitfour">بيتفور</option>
          <option value="biscuit">بسكويت</option>
          <option value="manin">منين</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">الرموز التعبيرية</label>
        <input type="text" class="form-input" id="product-emoji" placeholder="🍪" maxlength="2">
      </div>
      <button type="submit" class="btn btn-primary btn-block">إضافة المنتج</button>
    </form>
  </div>
</div>
</main>

<script src="/js/app.js"></script>
<script>
// Check authentication and role
if (!App.user || App.user.role !== 'baker') {
  window.location.href = '/pages/login.html?redirect=' + encodeURIComponent(window.location.href);
}

// Initialize dashboard
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('baker-name').textContent = App.user.name;
  loadDashboardData();
  setupFormHandlers();
});

function showTab(tabName) {
  // Hide all tabs
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  
  // Show selected tab
  document.getElementById(tabName + '-tab').classList.add('active');
  event.target.classList.add('active');
}

async function loadDashboardData() {
  try {
    // Load products
    const productsResponse = await fetch('/api/products?baker=' + App.user.id, {
      headers: App.authHeaders()
    });
    const products = await productsResponse.json();
    
    // Load orders
    const ordersResponse = await fetch('/api/orders?baker=' + App.user.id, {
      headers: App.authHeaders()
    });
    const orders = await ordersResponse.json();
    
    // Update statistics
    document.getElementById('products-count').textContent = products.length;
    document.getElementById('pending-orders').textContent = orders.filter(o => o.status === 'pending').length;
    
    const totalSales = orders
      .filter(o => o.status !== 'cancelled')
      .reduce((sum, order) => sum + order.total, 0);
    document.getElementById('total-sales').textContent = totalSales + ' ج.س';
    
    // Render products
    renderProducts(products);
    
    // Render orders
    renderOrders(orders);
    
  } catch (error) {
    console.error('Error loading dashboard data:', error);
    showError('فشل تحميل البيانات');
  }
}

function renderProducts(products) {
  const container = document.getElementById('products-list');
  
  if (products.length === 0) {
    container.innerHTML = '<div class="empty-state">لا توجد منتجات بعد. أضف منتجك الأول!</div>';
    return;
  }
  
  container.innerHTML = products.map(product => `
    <div class="product-item">
      <div>
        <strong>${product.emoji || '🍪'} ${product.name}</strong>
        <div style="color: var(--text-muted); font-size: 0.9rem;">
          ${product.price} ج.س / ${product.unit}
        </div>
      </div>
      <div class="product-actions">
        <button class="btn btn-small btn-secondary" onclick="editProduct('${product.id}')">تعديل</button>
        <button class="btn btn-small btn-danger" onclick="deleteProduct('${product.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

function renderOrders(orders) {
  const container = document.getElementById('orders-list');
  
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty-state">لا توجد طلبات بعد</div>';
    return;
  }
  
  container.innerHTML = orders.map(order => `
    <div class="order-item">
      <div>
        <strong>طلب #${order.id}</strong>
        <div style="color: var(--text-muted); font-size: 0.9rem;">
          ${order.customerName} • ${order.total} ج.س
        </div>
        <div style="margin-top: 5px;">
          ${order.items.map(item => `${item.qty}x ${item.name}`).join(', ')}
        </div>
      </div>
      <div>
        <span class="status-badge status-${order.status}">
          ${order.status === 'pending' ? 'جديد' : 
            order.status === 'confirmed' ? 'مؤكد' : 'تم التسليم'}
        </span>
        <div class="order-actions" style="margin-top: 8px;">
          ${order.status === 'pending' ? 
            `<button class="btn btn-small btn-primary" onclick="updateOrderStatus('${order.id}', 'confirmed')">تأكيد</button>` : ''}
          ${order.status === 'confirmed' ? 
            `<button class="btn btn-small btn-success" onclick="updateOrderStatus('${order.id}', 'delivered')">تم التسليم</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function setupFormHandlers() {
  const form = document.getElementById('add-product-form');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const productData = {
      name: document.getElementById('product-name').value,
      description: document.getElementById('product-description').value,
      price: parseFloat(document.getElementById('product-price').value),
      unit: document.getElementById('product-unit').value,
      category: document.getElementById('product-category').value,
      emoji: document.getElementById('product-emoji').value || '🍪',
      bakerId: App.user.id,
      bakerName: App.user.name
    };
    
    try {
      const response = await fetch('/api/products', {
        method: 'POST',
        headers: App.authHeaders(),
        body: JSON.stringify(productData)
      });
      
      if (!response.ok) throw new Error('فشل إضافة المنتج');
      
      // Reset form
      form.reset();
      
      // Show success message
      showSuccess('تم إضافة المنتج بنجاح!');
      
      // Reload data and switch to products tab
      await loadDashboardData();
      showTab('products');
      
    } catch (error) {
      console.error('Error adding product:', error);
      showError('فشل إضافة المنتج');
    }
  });
}

async function updateOrderStatus(orderId, newStatus) {
  try {
    const response = await fetch('/api/orders/' + orderId, {
      method: 'PATCH',
      headers: App.authHeaders(),
      body: JSON.stringify({ status: newStatus })
    });
    
    if (!response.ok) throw new Error('فشل تحديث الطلب');
    
    showSuccess('تم تحديث حالة الطلب');
    await loadDashboardData();
    
  } catch (error) {
    console.error('Error updating order:', error);
    showError('فشل تحديث الطلب');
  }
}

async function deleteProduct(productId) {
  if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
  
  try {
    const response = await fetch('/api/products/' + productId, {
      method: 'DELETE',
      headers: App.authHeaders()
    });
    
    if (!response.ok) throw new Error('فشل حذف المنتج');
    
    showSuccess('تم حذف المنتج');
    await loadDashboardData();
    
  } catch (error) {
    console.error('Error deleting product:', error);
    showError('فشل حذف المنتج');
  }
}

function editProduct(productId) {
  // TODO: Implement edit functionality
  showInfo('ميزة التعديل قيد التطوير');
}

function showSuccess(message) {
  const notification = document.createElement('div');
  notification.className = 'alert alert-success';
  notification.textContent = message;
  notification.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 15px; background: var(--success); color: white; border-radius: 8px;';
  document.body.appendChild(notification);
  
  setTimeout(() => notification.remove(), 3000);
}

function showError(message) {
  const notification = document.createElement('div');
  notification.className = 'alert alert-error';
  notification.textContent = message;
  notification.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 15px; background: var(--error); color: white; border-radius: 8px;';
  document.body.appendChild(notification);
  
  setTimeout(() => notification.remove(), 3000);
}

function showInfo(message) {
  const notification = document.createElement('div');
  notification.className = 'alert alert-info';
  notification.textContent = message;
  notification.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 15px; background: var(--primary); color: white; border-radius: 8px;';
  document.body.appendChild(notification);
  
  setTimeout(() => notification.remove(), 3000);
}
</script>
</body>
</html>
