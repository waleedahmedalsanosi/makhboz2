<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلباتي — مخبوز</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar" id="main-nav"></nav>

<main>
<div class="container">
  <div class="page-header">
    <h1>📋 طلباتي</h1>
    <p>تابع حالة جميع طلباتك</p>
  </div>
  <div id="orders-content">
    <div class="loading"><div class="spinner"></div><p style="margin-top:12px">جاري تحميل الطلبات...</p></div>
  </div>
</div>
</main>

<footer class="site-footer">
  <p><strong>Makhboz</strong> | مخبوز — كعك · بيتفور · بسكويت · منين</p>
  <p style="margin-top:6px">الخرطوم، السودان — 2026</p>
</footer>

<script src="/js/app.js"></script>
<script>
// Initialize orders page
document.addEventListener('DOMContentLoaded', function() {
  console.log('Orders page loading...');
  
  // Wait for App to initialize
  if (typeof App !== 'undefined') {
    // Force user load from localStorage
    const savedUser = localStorage.getItem('makhboz_user');
    if (savedUser) {
      try {
        App.user = JSON.parse(savedUser);
        console.log('User loaded from localStorage:', App.user);
      } catch (e) {
        console.error('Error parsing user data:', e);
      }
    }
    
    // Check authentication
    if (!App.user || !App.user.id) {
      console.log('No user found, redirecting to login');
      window.location.href = '/pages/login.html?redirect=/pages/orders.html';
      return;
    }
    
    // Load orders
    loadOrders();
  } else {
    console.error('App not loaded');
  }
});

async function loadOrders() {
  const container = document.getElementById('orders-content');
  try {
    console.log('Loading orders for user:', App.user);
    
    const res = await fetch('/api/orders', { headers: App.authHeaders() });
    if (!res.ok) throw new Error('فشل تحميل الطلبات');
    
    const data = await res.json();
    const orders = data.orders || [];
    
    console.log('Orders loaded:', orders);

    if (!orders.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>لا توجد طلبات بعد</h3><p>تصفح المنتجات واطلب الآن!</p><a href="/" class="btn btn-primary">تصفح المنتجات</a></div>';
      return;
    }

    container.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <span class="order-id">${order.id}</span>
            <span class="order-date">${App.timeAgo(order.createdAt)}</span>
          </div>
          <span class="order-status status-${order.status}">${App.statusName(order.status)}</span>
        </div>
        <div class="order-items">
          ${order.items.map(item => `
            <div class="order-item">
              <span>${item.productName} × ${item.qty} <span style="color:var(--gray);font-size:12px">(${item.bakerName})</span></span>
              <span>${App.formatPrice(item.itemTotal)} ج.س</span>
            </div>
          `).join('')}
        </div>
        <div class="order-total">
          <span>الإجمالي</span>
          <span>${App.formatPrice(order.total)} ج.س</span>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--gray)">
          📍 ${App.areaName(order.area)} — ${order.address}
          ${order.paymentMethod ? ' | 💳 ' + paymentLabel(order.paymentMethod) : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div class="alert alert-error">حدث خطأ في تحميل الطلبات</div>';
  }
}

function paymentLabel(method) {
  const map = { cash: 'نقدي', bankak: 'بنكك', fawry: 'فوري' };
  return map[method] || method;
}

// Don't auto-call loadOrders - wait for DOMContentLoaded
</script>
</body>
</html>
