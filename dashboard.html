<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — مخبوز</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.dashboard-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--card);
  padding: 25px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  text-align: center;
  border: 2px solid var(--border);
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--primary);
  margin: 15px 0;
}

.stat-label {
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: 600;
}

.content-section {
  background: var(--card);
  padding: 30px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--border);
}

.item-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.product-item, .order-item {
  background: var(--bg);
  padding: 20px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}

.item-info h4 {
  margin: 0 0 8px 0;
  color: var(--text);
}

.item-info p {
  margin: 0;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.item-actions {
  display: flex;
  gap: 10px;
}

.btn-small {
  padding: 8px 16px;
  font-size: 0.85rem;
}

.status-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
}

.status-pending { 
  background: #FFF3CD; 
  color: #856404; 
  border: 1px solid #FFEAA7;
}

.status-confirmed { 
  background: #D4EDDA; 
  color: #155724; 
  border: 1px solid #C3E6CB;
}

.status-delivered { 
  background: #D1ECF1; 
  color: #0C5460; 
  border: 1px solid #BEE5EB;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 1.1rem;
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.error-message {
  background: #F8D7DA;
  color: #721C24;
  padding: 15px;
  border-radius: 8px;
  margin: 20px 0;
  border: 1px solid #F5C6CB;
}

.success-message {
  background: #D4EDDA;
  color: #155724;
  padding: 15px;
  border-radius: 8px;
  margin: 20px 0;
  border: 1px solid #C3E6CB;
}

.form-section {
  background: var(--card);
  padding: 30px;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.debug-info {
  background: #F8F9FA;
  border: 1px solid #DEE2E6;
  padding: 15px;
  border-radius: 8px;
  margin: 20px 0;
  font-family: monospace;
  font-size: 0.9rem;
}
</style>
</head>
<body>
<nav class="navbar" id="main-nav"></nav>

<main>
<div class="dashboard-container">
  <!-- Debug Info -->
  <div id="debug-info" class="debug-info" style="display: none;">
    <strong>Debug Information:</strong><br>
    <div id="debug-content"></div>
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1>لوحة التحكم</h1>
    <p id="welcome-message">جاري التحميل...</p>
  </div>

  <!-- Error Display -->
  <div id="error-container"></div>

  <!-- Success Display -->
  <div id="success-container"></div>

  <!-- Statistics -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">المنتجات</div>
      <div class="stat-number" id="products-count">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">الطلبات الجديدة</div>
      <div class="stat-number" id="pending-orders">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">إجمالي المبيعات</div>
      <div class="stat-number" id="total-sales">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">الحالة</div>
      <div class="stat-number" id="connection-status">🔄</div>
    </div>
  </div>

  <!-- Products Section -->
  <div class="content-section">
    <div class="section-header">
      <h3>منتجاتي</h3>
      <button class="btn btn-primary" onclick="showAddProductForm()">+ إضافة منتج</button>
    </div>
    <div id="products-container" class="loading">جاري تحميل المنتجات...</div>
  </div>

  <!-- Orders Section -->
  <div class="content-section">
    <div class="section-header">
      <h3>الطلبات</h3>
      <button class="btn btn-secondary" onclick="refreshOrders()">🔄 تحديث</button>
    </div>
    <div id="orders-container" class="loading">جاري تحميل الطلبات...</div>
  </div>

  <!-- Add Product Form (Hidden by default) -->
  <div id="add-product-form" class="form-section" style="display: none;">
    <h3>إضافة منتج جديد</h3>
    <form id="product-form" onsubmit="handleAddProduct(event)">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">اسم المنتج</label>
          <input type="text" class="form-input" id="product-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">السعر (ج.س)</label>
          <input type="number" class="form-input" id="product-price" min="0" step="0.5" required>
        </div>
        <div class="form-group">
          <label class="form-label">الفئة</label>
          <select class="form-input" id="product-category" required>
            <option value="kaak">كعك</option>
            <option value="petitfour">بيتفور</option>
            <option value="biscuit">بسكويت</option>
            <option value="manin">منين</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الوحدة</label>
          <select class="form-input" id="product-unit" required>
            <option value="piece">قطعة</option>
            <option value="dozen">دزينة</option>
            <option value="kg">كيلو</option>
            <option value="box">صندوق</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">الوصف</label>
        <textarea class="form-input" id="product-description" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">صورة المنتج (اختياري)</label>
        <input type="file" class="form-input" id="product-image" accept="image/jpeg,image/png,image/webp" style="padding:8px">
        <p style="font-size:12px;color:var(--text-muted);margin-top:4px">JPEG / PNG / WebP — بحد أقصى 5 ميجابايت</p>
        <div id="image-preview" style="margin-top:10px;display:none">
          <img id="image-preview-img" style="max-width:200px;max-height:150px;border-radius:8px;object-fit:cover">
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn btn-primary" id="add-product-btn">إضافة المنتج</button>
        <button type="button" class="btn btn-secondary" onclick="hideAddProductForm()">إلغاء</button>
      </div>
    </form>
  </div>
</div>
</main>

<script src="/js/app.js"></script>
<script>
// Global state
let currentUser = null;
let products = [];
let orders = [];

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  console.log('Dashboard loading...');
  initializeDashboard();
});

async function initializeDashboard() {
  try {
    // Check authentication
    await checkAuthentication();
    
    // Load data
    await loadDashboardData();
    
    // Update UI
    updateUI();
    
    console.log('Dashboard initialized successfully');
  } catch (error) {
    console.error('Dashboard initialization error:', error);
    showError('فشل تحميل لوحة التحكم: ' + error.message);
  }
}

async function checkAuthentication() {
  // Get user from localStorage
  const savedUser = localStorage.getItem('makhboz_user');
  const savedToken = localStorage.getItem('makhboz_token');
  
  if (!savedUser || !savedToken) {
    throw new Error('يجب تسجيل الدخول أولاً');
  }
  
  try {
    currentUser = JSON.parse(savedUser);
  } catch (e) {
    throw new Error('بيانات المستخدم تالفة');
  }
  
  if (currentUser.role !== 'baker') {
    throw new Error('هذه الصفحة مخصصة للخبازين فقط');
  }
  
  // Update welcome message
  document.getElementById('welcome-message').textContent = `مرحباً بك ${currentUser.name}`;
  
  // Update debug info
  updateDebugInfo();
}

function updateDebugInfo() {
  const debugContent = document.getElementById('debug-content');
  if (debugContent) {
    debugContent.innerHTML = `
      User ID: ${currentUser?.id}<br>
      User Name: ${currentUser?.name}<br>
      User Role: ${currentUser?.role}<br>
      User Area: ${currentUser?.area}<br>
      Token: ${localStorage.getItem('makhboz_token') ? 'Exists' : 'Missing'}<br>
      Current URL: ${window.location.href}
    `;
  }
}

async function loadDashboardData() {
  try {
    // Update connection status
    document.getElementById('connection-status').textContent = '🔄';
    
    // Load products
    await loadProducts();
    
    // Load orders
    await loadOrders();
    
    // Update connection status
    document.getElementById('connection-status').textContent = '✅';
    
  } catch (error) {
    console.error('Error loading dashboard data:', error);
    document.getElementById('connection-status').textContent = '❌';
    throw error;
  }
}

async function loadProducts() {
  try {
    console.log('Loading products...');
    
    const response = await fetch('/api/products?bakerId=' + currentUser.id, {
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token')
      }
    });
    
    if (!response.ok) {
      throw new Error(`فشل تحميل المنتجات: ${response.status}`);
    }
    
    const data = await response.json();
    products = data.products || [];
    
    console.log('Products loaded:', products);
    
    // Update products count
    document.getElementById('products-count').textContent = products.length;
    
    // Render products
    renderProducts();
    
  } catch (error) {
    console.error('Error loading products:', error);
    document.getElementById('products-container').innerHTML = 
      `<div class="error-message">فشل تحميل المنتجات: ${error.message}</div>`;
  }
}

async function loadOrders() {
  try {
    console.log('Loading orders...');
    
    const response = await fetch('/api/orders', {
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token')
      }
    });
    
    if (!response.ok) {
      throw new Error(`فشل تحميل الطلبات: ${response.status}`);
    }
    
    const data = await response.json();
    orders = data.orders || [];
    
    console.log('Orders loaded:', orders);
    
    // Update statistics
    const pendingCount = orders.filter(o => o.status === 'pending').length;
    document.getElementById('pending-orders').textContent = pendingCount;
    
    const totalSales = orders
      .filter(o => o.status !== 'cancelled')
      .reduce((sum, order) => sum + (order.total || 0), 0);
    document.getElementById('total-sales').textContent = totalSales;
    
    // Render orders
    renderOrders();
    
  } catch (error) {
    console.error('Error loading orders:', error);
    document.getElementById('orders-container').innerHTML = 
      `<div class="error-message">فشل تحميل الطلبات: ${error.message}</div>`;
  }
}

function renderProducts() {
  const container = document.getElementById('products-container');
  
  if (products.length === 0) {
    container.innerHTML = '<div class="empty-state">لا توجد منتجات بعد. أضف منتجك الأول!</div>';
    return;
  }
  
  container.innerHTML = products.map(product => `
    <div class="product-item">
      <div class="item-info">
        <h4>${product.emoji || '🍪'} ${product.name}</h4>
        <p>${product.price} ج.س / ${product.unit}</p>
        <p style="font-size: 0.8rem; color: #666;">${product.description || ''}</p>
      </div>
      <div class="item-actions">
        <button class="btn btn-small btn-danger" onclick="deleteProduct('${product.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

function renderOrders() {
  const container = document.getElementById('orders-container');
  
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty-state">لا توجد طلبات بعد</div>';
    return;
  }
  
  console.log('Rendering orders:', orders);
  
  container.innerHTML = orders.map(order => {
    console.log('Order items:', order.items);
    return `
    <div class="order-item">
      <div class="item-info">
        <h4>طلب #${order.id}</h4>
        <p><strong>العميل:</strong> ${order.customerName || 'غير محدد'}</p>
        <p><strong>الهاتف:</strong> ${order.customerPhone || 'غير محدد'}</p>
        <p><strong>الإجمالي:</strong> ${order.total || 0} ج.س</p>
        <p><strong>المنطقة:</strong> ${order.area || 'غير محدد'}</p>
        <p><strong>الحالة:</strong> <span class="status-badge status-${order.status}">${getStatusText(order.status)}</span></p>
        <p><strong>التاريخ:</strong> ${order.createdAt ? new Date(order.createdAt).toLocaleDateString('ar-SD') : 'غير محدد'}</p>
        
        <div style="margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 8px;">
          <strong>المنتجات:</strong>
          ${(order.items || []).map(item => {
            console.log('Item:', item);
            return `<div style="margin: 5px 0; padding: 5px; background: white; border-radius: 4px;">
              • ${item.qty || 1}x ${item.productName || 'منتج'} - <strong>${item.price || 0} ج.س</strong> 
              ${item.bakerName ? `<span style="color: var(--primary);">(${item.bakerName})</span>` : '<span style="color: red;">(لا يوجد اسم التاجر)</span>'}
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="item-actions">
        ${order.status === 'pending' ? 
          `<button class="btn btn-small btn-primary" onclick="updateOrderStatus('${order.id}', 'confirmed')">تأكيد الطلب</button>` : ''}
        ${order.status === 'confirmed' ? 
          `<button class="btn btn-small btn-success" onclick="updateOrderStatus('${order.id}', 'delivered')">تم التسليم</button>` : ''}
      </div>
    </div>
  `;
  }).join('');
}

function getStatusText(status) {
  const statusMap = {
    pending: 'جديد',
    confirmed: 'مؤكد',
    preparing: 'قيد التحضير',
    delivering: 'قيد التوصيل',
    delivered: 'تم التسليم',
    cancelled: 'ملغي'
  };
  return statusMap[status] || status;
}

function showAddProductForm() {
  document.getElementById('add-product-form').style.display = 'block';
  document.getElementById('add-product-form').scrollIntoView({ behavior: 'smooth' });
}

function hideAddProductForm() {
  document.getElementById('add-product-form').style.display = 'none';
  document.getElementById('product-form').reset();
}

async function handleAddProduct(event) {
  event.preventDefault();

  const btn = document.getElementById('add-product-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الإضافة...';

  try {
    // Upload image if selected
    let imageUrl = '';
    const imageFile = document.getElementById('product-image').files[0];
    if (imageFile) {
      btn.textContent = 'جاري رفع الصورة...';
      const formData = new FormData();
      formData.append('image', imageFile);
      const uploadRes = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token') },
        body: formData
      });
      if (!uploadRes.ok) {
        const err = await uploadRes.json();
        throw new Error(err.error || 'فشل رفع الصورة');
      }
      const uploadData = await uploadRes.json();
      imageUrl = uploadData.url;
      btn.textContent = 'جاري الإضافة...';
    }

    const productData = {
      name: document.getElementById('product-name').value,
      description: document.getElementById('product-description').value,
      price: parseFloat(document.getElementById('product-price').value),
      unit: document.getElementById('product-unit').value,
      category: document.getElementById('product-category').value,
      minOrder: 1,
      imageUrl
    };

    const response = await fetch('/api/products', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token')
      },
      body: JSON.stringify(productData)
    });

    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error || 'فشل إضافة المنتج');
    }

    showSuccess('تم إضافة المنتج بنجاح!');
    hideAddProductForm();
    
    // Reload products
    await loadProducts();
    
  } catch (error) {
    console.error('Error adding product:', error);
    showError('فشل إضافة المنتج: ' + error.message);
    btn.disabled = false;
    btn.textContent = 'إضافة المنتج';
  }
}

// Image preview
document.addEventListener('DOMContentLoaded', function() {
  const imageInput = document.getElementById('product-image');
  if (imageInput) {
    imageInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('image-preview-img').src = e.target.result;
          document.getElementById('image-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        document.getElementById('image-preview').style.display = 'none';
      }
    });
  }
});

async function deleteProduct(productId) {
  if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
  
  try {
    const response = await fetch('/api/products?id=' + productId, {
      method: 'DELETE',
      headers: {
        'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token')
      }
    });
    
    if (!response.ok) {
      throw new Error('فشل حذف المنتج');
    }
    
    showSuccess('تم حذف المنتج');
    await loadProducts();
    
  } catch (error) {
    console.error('Error deleting product:', error);
    showError('فشل حذف المنتج: ' + error.message);
  }
}

async function updateOrderStatus(orderId, newStatus) {
  try {
    const response = await fetch('/api/orders', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('makhboz_token')
      },
      body: JSON.stringify({ 
        action: 'updateStatus', 
        orderId, 
        status: newStatus 
      })
    });
    
    if (!response.ok) {
      throw new Error('فشل تحديث الطلب');
    }
    
    showSuccess('تم تحديث حالة الطلب');
    await loadOrders();
    
  } catch (error) {
    console.error('Error updating order:', error);
    showError('فشل تحديث الطلب: ' + error.message);
  }
}

async function refreshOrders() {
  await loadOrders();
}

function showError(message) {
  const container = document.getElementById('error-container');
  container.innerHTML = `<div class="error-message">${message}</div>`;
  setTimeout(() => {
    container.innerHTML = '';
  }, 5000);
}

function showSuccess(message) {
  const container = document.getElementById('success-container');
  container.innerHTML = `<div class="success-message">${message}</div>`;
  setTimeout(() => {
    container.innerHTML = '';
  }, 3000);
}

function updateUI() {
  // Show debug info in development
  if (window.location.hostname === 'localhost') {
    document.getElementById('debug-info').style.display = 'block';
  }
}

// Toggle debug info
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'D') {
    const debugInfo = document.getElementById('debug-info');
    debugInfo.style.display = debugInfo.style.display === 'none' ? 'block' : 'none';
  }
});
</script>
</body>
</html>
