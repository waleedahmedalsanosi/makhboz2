<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مخبوز — سوق الحلويات والمخبوزات السودانية</title>
<meta name="description" content="مخبوز — أول منصة سودانية لطلب الكعك والبيتفور والبسكويت والمنين المنزلي. تصفح واطلب من أمهات سودانيات في الخرطوم.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar" id="main-nav"></nav>

<section class="hero-banner">
  <img src="/logo.png" alt="مخبوز" style="width:80px;height:80px;border-radius:50%;margin-bottom:12px;border:3px solid rgba(244,239,209,0.3)">
  <h1>مخبوز <span style="font-size:0.5em;opacity:0.7">Makhboz</span></h1>
  <p>كعك · بيتفور · بسكويت · منين — من أيدي أمهات سودانيات لبيتكم</p>
</section>

<main>
<div class="container" style="padding-top:40px">
  <!-- Filters -->
  <div class="filters-bar">
    <input type="search" class="search-input" id="search" placeholder="ابحث عن منتج أو صانعة...">
    <button class="filter-chip active" data-category="" onclick="filterCategory(this)">الكل</button>
    <button class="filter-chip" data-category="kaak" onclick="filterCategory(this)">🍪 كعك</button>
    <button class="filter-chip" data-category="petitfour" onclick="filterCategory(this)">🧁 بيتفور</button>
    <button class="filter-chip" data-category="biscuit" onclick="filterCategory(this)">🍘 بسكويت</button>
    <button class="filter-chip" data-category="manin" onclick="filterCategory(this)">🥮 منين</button>
  </div>

  <!-- Area Filter -->
  <div class="filters-bar" style="margin-bottom:20px">
    <span style="font-size:13px;color:var(--gray);font-weight:600">المنطقة:</span>
    <button class="filter-chip active" data-area="" onclick="filterArea(this)" style="padding:5px 12px;font-size:12px">الكل</button>
    <button class="filter-chip" data-area="bahri" onclick="filterArea(this)" style="padding:5px 12px;font-size:12px">بحري</button>
    <button class="filter-chip" data-area="omdurman" onclick="filterArea(this)" style="padding:5px 12px;font-size:12px">أم درمان</button>
    <button class="filter-chip" data-area="khartoum" onclick="filterArea(this)" style="padding:5px 12px;font-size:12px">الخرطوم</button>
    <button class="filter-chip" data-area="khartoum-north" onclick="filterArea(this)" style="padding:5px 12px;font-size:12px">الخرطوم شمال</button>
  </div>

  <!-- Products Grid -->
  <div id="products-grid" class="product-grid"></div>
  <div id="products-state"></div>
  <div id="load-more-wrap" style="text-align:center;margin:28px 0;display:none">
    <button class="btn btn-secondary" id="load-more-btn" onclick="loadMore()">تحميل المزيد</button>
  </div>
</div>
</main>

<footer class="site-footer">
  <p><strong>Makhboz</strong> | مخبوز — كعك · بيتفور · بسكويت · منين</p>
  <p style="margin-top:6px">الخرطوم، السودان — 2026</p>
</footer>

<script src="/js/app.js"></script>
<script>
let currentCategory = '';
let currentArea = '';
let currentSearch = '';
let currentPage = 1;
let isLoading = false;
let searchTimeout = null;

async function loadProducts(page, append) {
  if (isLoading) return;
  isLoading = true;

  const stateEl = document.getElementById('products-state');
  const loadMoreWrap = document.getElementById('load-more-wrap');

  if (!append) {
    document.getElementById('products-grid').innerHTML = '';
    stateEl.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">جاري تحميل المنتجات...</p></div>';
    loadMoreWrap.style.display = 'none';
  } else {
    document.getElementById('load-more-btn').textContent = 'جاري التحميل...';
  }

  try {
    if (page === 1) {
      try { await fetch('/api/seed', { method: 'POST' }); } catch(e) {}
    }

    const params = new URLSearchParams({ page, limit: 20 });
    if (currentCategory) params.set('category', currentCategory);
    if (currentArea) params.set('area', currentArea);
    if (currentSearch) params.set('search', currentSearch);

    const res = await fetch('/api/products?' + params.toString());
    const data = await res.json();
    const products = data.products || [];

    stateEl.innerHTML = '';

    if (!products.length && page === 1) {
      stateEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>لا توجد منتجات</h3><p>جرب تغيير الفلتر أو البحث بكلمة مختلفة</p></div>';
      loadMoreWrap.style.display = 'none';
    } else {
      appendProducts(products);
      loadMoreWrap.style.display = data.hasMore ? 'block' : 'none';
      document.getElementById('load-more-btn').textContent = 'تحميل المزيد';
      currentPage = page;
    }
  } catch(e) {
    stateEl.innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><h3>حدث خطأ</h3><p>لم نتمكن من تحميل المنتجات. حاول مرة أخرى.</p></div>';
  }

  isLoading = false;
}

function appendProducts(products) {
  const grid = document.getElementById('products-grid');
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card product-card';
    card.onclick = () => window.location.href = '/pages/product.html?id=' + p.id;
    card.innerHTML = `
      <div class="product-img">
        ${p.imageUrl
          ? `<img src="${p.imageUrl}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0">`
          : p.emoji || '🍪'}
      </div>
      <div class="card-body">
        <div class="product-name">${p.name}</div>
        <div class="product-baker">👩‍🍳 ${p.bakerName}</div>
        <div class="product-price">${App.formatPrice(p.price)} <span class="unit">ج.س / ${p.unit === 'kg' ? 'كيلو' : p.unit === 'piece' ? 'قطعة' : 'صندوق'}</span></div>
        <div class="product-meta">
          <span class="product-area">📍 ${App.areaName(p.area)}</span>
          <span class="product-category">${App.categoryName(p.category)}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function loadMore() {
  loadProducts(currentPage + 1, true);
}

function filterCategory(el) {
  document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentCategory = el.dataset.category;
  loadProducts(1, false);
}

function filterArea(el) {
  document.querySelectorAll('[data-area]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentArea = el.dataset.area;
  loadProducts(1, false);
}

document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentSearch = e.target.value.trim();
    loadProducts(1, false);
  }, 350);
});

loadProducts(1, false);
</script>
</body>
</html>
