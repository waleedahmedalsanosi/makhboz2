<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة — مخبوز</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar" id="main-nav"></nav>

<main>
<div class="container">
  <div class="page-header">
    <h1>🛒 سلة التسوق</h1>
  </div>
  <div id="cart-content"></div>
</div>
</main>

<footer class="site-footer">
  <p><strong>Makhboz</strong> | مخبوز — كعك · بيتفور · بسكويت · منين</p>
  <p style="margin-top:6px">الخرطوم، السودان — 2026</p>
</footer>

<script src="/js/app.js"></script>
<script>
function renderCart() {
  const cart = App.getCart();
  const container = document.getElementById('cart-content');

  if (!cart.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3>السلة فارغة</h3>
        <p>تصفح المنتجات وأضف ما يعجبك</p>
        <a href="/" class="btn btn-primary">تصفح المنتجات</a>
      </div>
    `;
    return;
  }

  const total = App.getCartTotal();

  container.innerHTML = `
    <div class="two-col">
      <div>
        <table class="cart-table">
          <thead>
            <tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th></th></tr>
          </thead>
          <tbody>
            ${cart.map(item => `
              <tr>
                <td>
                  <span style="font-size:24px;margin-left:8px">${item.emoji || '🍪'}</span>
                  <span class="cart-item-name">${item.name}</span><br>
                  <span class="cart-item-baker">👩‍🍳 ${item.bakerName}</span>
                </td>
                <td>${App.formatPrice(item.price)} ج.س</td>
                <td>
                  <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty('${item.id}', ${item.qty - 1})">-</button>
                    <span class="qty-val">${item.qty}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}', ${item.qty + 1})">+</button>
                  </div>
                </td>
                <td style="font-weight:700">${App.formatPrice(item.price * item.qty)} ج.س</td>
                <td><button class="cart-remove" onclick="removeItem('${item.id}')" title="حذف">✕</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div>
        <div class="summary-box">
          <h3 style="color:var(--teal);margin-bottom:16px">ملخص الطلب</h3>
          ${cart.map(item => `
            <div class="summary-row">
              <span>${item.name} × ${item.qty}</span>
              <span>${App.formatPrice(item.price * item.qty)} ج.س</span>
            </div>
          `).join('')}
          <div class="summary-row total">
            <span>الإجمالي</span>
            <span>${App.formatPrice(total)} ج.س</span>
          </div>
          <a href="/pages/checkout.html" class="btn btn-amber btn-block btn-lg" style="margin-top:20px">إتمام الطلب</a>
          <button class="btn btn-secondary btn-block btn-sm" style="margin-top:8px" onclick="clearCart()">مسح السلة</button>
        </div>
      </div>
    </div>
  `;
}

function updateQty(id, newQty) {
  App.updateCartQty(id, Math.max(1, newQty));
  renderCart();
}

function removeItem(id) {
  App.removeFromCart(id);
  renderCart();
}

function clearCart() {
  if (confirm('هل تريد مسح جميع المنتجات من السلة؟')) {
    App.clearCart();
    renderCart();
  }
}

renderCart();
</script>
</body>
</html>
